display_information:
  name: Lingo Bot
  description: Auto-translates Portuguese/Chinese/anything-else messages in-thread
  background_color: '#1a1a2e'
features:
  app_home:
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: lingo
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write # post threaded replies
      - channels:history # public channel messages
      - groups:history # private channel messages
      - mpim:history # group-DM messages
      - im:history # DMs with the bot itself
      - reactions:write # warning emoji on failures
settings:
  event_subscriptions:
    request_url: https://YOUR-APP.vercel.app/api/slack/events
    bot_events:
      - message.channels
      - message.groups
      - message.mpim
      - message.im
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
